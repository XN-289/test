<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{page_title}}</title>
    <link rel="stylesheet" href="/pages/style.css">
    <!-- SEO_SCHEMA_INJECTION -->
</head>
<body class="clinical-light">
    <header class="viasurg-header">
        <nav>
            <a href="/">{{ui_nav_home}}</a>
            <div class="mega-menu">
                <button>{{ui_nav_products}}</button>
                <!-- MEGA_MENU_INJECTION -->
            </div>
            <a href="/academy/">{{ui_nav_academy}}</a>
        </nav>
    </header>

    <main class="product-container">
        <h1>{{content_title}}</h1>
        <section class="hierarchy-tags">
            <span class="badge">{{content_category}}</span>
            <span class="badge">{{content_material}}</span>
        </section>

        <article class="content-body">
            {{content_body}}
        </article>

        <aside class="evidence-protocol">
            <h3>{{ui_labels_evidence}}</h3>
            {{evidence_links}}
        </aside>
    </main>

    <footer class="viasurg-footer">
        <p>{{ui_footer_copy}}</p>
        <div class="lang-switcher">
            <a href="/en/{{page_url}}">English</a> | <a href="/zh/{{page_url}}">中文</a>
        </div>
    </footer>
</body>
</html>
